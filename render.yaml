services:
  - type: web
    name: docquery-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python manage.py migrate --noinput && python manage.py collectstatic --noinput
    startCommand: gunicorn docquery_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile - --error-logfile -
    healthCheckPath: /healthz/
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: docquery-backend.onrender.com
      - key: FRONTEND_ORIGIN
        value: https://doc-query-sigma.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        value: https://doc-query-sigma.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://doc-query-sigma.vercel.app
      - key: DATABASE_SSLMODE
        value: require
      - key: USE_S3_STORAGE
        value: "True"
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_STORAGE_ENDPOINT
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        sync: false
      - key: SUPABASE_STORAGE_ACCESS_KEY
        sync: false
      - key: SUPABASE_STORAGE_SECRET_KEY
        sync: false

  - type: worker
    name: docquery-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py process_documents
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: docquery-backend.onrender.com
      - key: FRONTEND_ORIGIN
        value: https://doc-query-sigma.vercel.app
      - key: DATABASE_SSLMODE
        value: require
      - key: USE_S3_STORAGE
        value: "True"
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_STORAGE_ENDPOINT
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        sync: false
      - key: SUPABASE_STORAGE_ACCESS_KEY
        sync: false
      - key: SUPABASE_STORAGE_SECRET_KEY
        sync: false
